<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1017" />
      <stop offset="100%" stop-color="#181b28" />
    </linearGradient>
    <linearGradient id="master-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a3045" />
      <stop offset="100%" stop-color="#1d2230" />
    </linearGradient>
    <linearGradient id="orange-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9040" />
      <stop offset="100%" stop-color="#ff5000" />
    </linearGradient>
    <linearGradient id="pink-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb1de" />
      <stop offset="100%" stop-color="#ff7ec3" />
    </linearGradient>
    <linearGradient id="lime-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bfffa6" />
      <stop offset="100%" stop-color="#73e648" />
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a6e7ff" />
      <stop offset="100%" stop-color="#38bcf2" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="15" />

  <!-- Connecting LAN/Ray network path -->
  <path d="M 330,190 L 670,190" fill="none" stroke="#a6e7ff" stroke-width="4" stroke-dasharray="10 8" filter="url(#glow)" />
  <text x="500" y="170" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#a6e7ff" text-anchor="middle" letter-spacing="1">RAY CLUSTER CONCURRENT NETWORKING (WSL2 Mirrored Mode)</text>

  <!-- LEFT CARD: PC 1 (MASTER / HEAD) -->
  <g transform="translate(60, 80)">
    <!-- Base Card -->
    <rect width="320" height="260" rx="10" fill="url(#master-grad)" stroke="#ff9040" stroke-width="2" />
    <!-- Header -->
    <rect width="320" height="50" rx="10" fill="#202538" />
    <text x="20" y="32" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="bold" fill="#ff9040">🖥️ HEAD NODE (MASTER)</text>
    
    <!-- Software Layers -->
    <rect x="20" y="70" width="280" height="35" rx="5" fill="#151924" stroke="#ffb1de" stroke-width="1" />
    <text x="35" y="93" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#ffb1de">vLLM Inference Engine (Port 8000)</text>

    <rect x="20" y="115" width="280" height="35" rx="5" fill="#151924" stroke="#a6e7ff" stroke-width="1" />
    <text x="35" y="138" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#a6e7ff">Ray Head Process (Port 6379)</text>

    <rect x="20" y="160" width="280" height="35" rx="5" fill="#151924" stroke="#bfffa6" stroke-width="1" />
    <text x="35" y="183" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#bfffa6">NVIDIA CUDA GPU Integration</text>

    <rect x="20" y="205" width="280" height="35" rx="5" fill="#282d3f" />
    <text x="160" y="228" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle" opacity="0.8">HOST: MASTER_HOSTNAME</text>
  </g>

  <!-- RIGHT CARD: PC 2 (WORKER) -->
  <g transform="translate(620, 80)">
    <!-- Base Card -->
    <rect width="320" height="260" rx="10" fill="url(#master-grad)" stroke="#ff7ec3" stroke-width="2" />
    <!-- Header -->
    <rect width="320" height="50" rx="10" fill="#202538" />
    <text x="20" y="32" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="bold" fill="#ff7ec3">💻 WORKER NODE</text>
    
    <!-- Software Layers -->
    <rect x="20" y="70" width="280" height="35" rx="5" fill="#151924" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.6" />
    <text x="35" y="93" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" opacity="0.6">vLLM Engine (Delegated by Ray)</text>

    <rect x="20" y="115" width="280" height="35" rx="5" fill="#151924" stroke="#a6e7ff" stroke-width="1" />
    <text x="35" y="138" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#a6e7ff">Ray Worker Process (Auto-connect)</text>

    <rect x="20" y="160" width="280" height="35" rx="5" fill="#151924" stroke="#bfffa6" stroke-width="1" />
    <text x="35" y="183" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#bfffa6">NVIDIA CUDA GPU Integration</text>

    <rect x="20" y="205" width="280" height="35" rx="5" fill="#282d3f" />
    <text x="160" y="228" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle" opacity="0.8">HOST: WORKER_HOSTNAME</text>
  </g>

  <!-- CENTER BOTTOM: LOCAL CONFIGURATION STATE (C:\xyz-gpu) -->
  <g transform="translate(340, 370)">
    <!-- Paths from nodes to central state -->
    <path d="M -50,-80 L 100,-15" fill="none" stroke="#bfffa6" stroke-width="2" stroke-dasharray="5 5" />
    <path d="M 370,-80 L 220,-15" fill="none" stroke="#bfffa6" stroke-width="2" stroke-dasharray="5 5" />

    <!-- Drive representation -->
    <rect width="320" height="90" rx="10" fill="#121520" stroke="#bfffa6" stroke-width="2" />
    <text x="160" y="32" font-family="'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="bold" fill="#bfffa6" text-anchor="middle">📂 LOCAL STATE STORAGE (C:\xyz-gpu)</text>
    <text x="160" y="58" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" opacity="0.8">JSON file: cluster_state.json</text>
    <text x="160" y="76" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#a6e7ff" text-anchor="middle" opacity="0.6">Stores: local settings and manual Master IP mapping</text>
  </g>
</svg>

