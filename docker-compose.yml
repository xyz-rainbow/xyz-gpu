services:
  vllm-node:
    image: vllm/vllm-openai:v0.4.2
    container_name: vllm-cluster-node
    entrypoint: ["bash", "-c"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    network_mode: "host"
    ipc: host
    environment:
      - NCCL_SOCKET_IFNAME=eth,en,wlan,ethernet,lo
      - RAY_HEAD_IP=${MASTER_IP}
      - NODE_ROLE=${NODE_ROLE}
      - MODEL_NAME=${MODEL_NAME}
      - PIPELINE_SIZE=${PIPELINE_SIZE}
      - TENSOR_SIZE=${TENSOR_SIZE}
      - GPU_MEM_LIMIT=${GPU_MEM_LIMIT:-0.90}
      - MAX_MODEL_LEN=${MAX_MODEL_LEN:-2048}
      - VLLM_QUANTIZATION=${VLLM_QUANTIZATION:-}
      - MASTER_IP=${MASTER_IP}
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    command:
      - |
        if [ "$NODE_ROLE" = "head" ]; then
          echo '📦 Instalando Ray Dashboard...';
          pip install -q 'aiohttp' 'grpcio' 'opencensus' 2>/dev/null || true;
          echo '🚀 Iniciando Ray HEAD con Dashboard en :8265...';
          ray start --head --port=6379 --dashboard-host=0.0.0.0 --dashboard-port=8265 --include-dashboard=true --block &
          sleep 15;
          echo '⚡ Levantando vLLM API Server...';
          QUANT_FLAG="";
          if [ -n "$VLLM_QUANTIZATION" ]; then QUANT_FLAG="--quantization $VLLM_QUANTIZATION"; fi;
          python3 -m vllm.entrypoints.openai.api_server \
            --model "$MODEL_NAME" \
            --pipeline-parallel-size "$PIPELINE_SIZE" \
            --tensor-parallel-size "$TENSOR_SIZE" \
            --gpu-memory-utilization "${GPU_MEM_LIMIT:-0.90}" \
            --max-model-len "${MAX_MODEL_LEN:-2048}" \
            $QUANT_FLAG \
            --host 0.0.0.0 \
            --port 8000;
        else
          echo "📡 Conectando como WORKER a ${MASTER_IP}:6379...";
          ray start --address="${MASTER_IP}:6379" --block;
        fi

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-gateway
    network_mode: "host"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    environment:
      - NODE_ROLE=${NODE_ROLE}
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ "$NODE_ROLE" = "head" ]; then
          echo '🚀 Iniciando LiteLLM Gateway en :4000...';
          exec litellm --config /app/config.yaml --port 4000;
        else
          echo '📡 LiteLLM inactivo en nodo Worker.';
          while true; do sleep 3600; done;
        fi
